name: Health check rest-api container updater

on:
  push:
    branches:
      - master
jobs:
  deploy:
    name: Deploy new docker container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1
          role-session-name: health-check-api-deploy
      - name: Authenticate to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build docker image and push to ECR
        run:  |
          docker build -t 343218214405.dkr.ecr.eu-central-1.amazonaws.com/health-check-api:latest .
          docker push 343218214405.dkr.ecr.eu-central-1.amazonaws.com/health-check-api:latest
      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
          --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --region eu-central-1 \
          --parameters '{"commands":["aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin 343218214405.dkr.ecr.eu-central-1.amazonaws.com","docker pull 343218214405.dkr.ecr.eu-central-1.amazonaws.com/health-check-api:latest","docker stop health-check-api || true","docker rm health-check-api || true","docker run -d --name health-check-api -p 5000:5000 -v /var/run/docker.sock:/var/run/docker.sock 343218214405.dkr.ecr.eu-central-1.amazonaws.com/health-check-api:latest"]}'
